<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>秋葉原TRIO DX 値段表</title>
<style>
:root {
  --bg: #0f0f14;
  --bg2: #1a1a24;
  --bg3: #22222e;
  --border: #2e2e40;
  --text: #e8e8f0;
  --text2: #9090a8;
  --accent-ikko: #ff6b9d;
  --accent-noimii: #6bb5ff;
  --accent-niajoi: #a06bff;
  --opened: #ff9940;
  --tag-bg: #2a2a3a;
  --tag-hover: #3a3a50;
  --search-bg: #1e1e2a;
  --card-shadow: 0 2px 8px rgba(0,0,0,0.4);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
  font-size: 14px;
  min-height: 100vh;
}

/* Header */
header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-title {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 0.05em;
  margin-bottom: 10px;
  color: var(--text);
}
.header-title span { color: var(--text2); font-size: 12px; font-weight: 400; margin-left: 8px; }

/* Group Tabs */
.group-tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 10px;
}
.group-tab {
  flex: 1;
  padding: 8px 4px;
  border: 1.5px solid var(--border);
  background: transparent;
  color: var(--text2);
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
}
.group-tab.active-ikko { background: rgba(255,107,157,0.15); border-color: var(--accent-ikko); color: var(--accent-ikko); }
.group-tab.active-noimii { background: rgba(107,181,255,0.15); border-color: var(--accent-noimii); color: var(--accent-noimii); }
.group-tab.active-niajoi { background: rgba(160,107,255,0.15); border-color: var(--accent-niajoi); color: var(--accent-niajoi); }

/* Search */
.search-row {
  display: flex;
  gap: 8px;
  align-items: center;
}
.search-wrap {
  flex: 1;
  position: relative;
}
.search-wrap::before {
  content: '🔍';
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 14px;
  pointer-events: none;
}
#searchInput {
  width: 100%;
  padding: 8px 10px 8px 32px;
  background: var(--search-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 14px;
  outline: none;
}
#searchInput:focus { border-color: var(--text2); }
#clearBtn {
  display: none;
  padding: 8px 12px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text2);
  font-size: 12px;
  cursor: pointer;
  white-space: nowrap;
}

/* View Toggle */
.view-toggle {
  display: flex;
  gap: 6px;
  margin-top: 8px;
}
.view-btn {
  padding: 6px 12px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
}
.view-btn.active {
  background: var(--bg3);
  border-color: var(--text);
  color: var(--text);
}

/* Main content */
main {
  padding: 12px 16px;
  max-width: 680px;
  margin: 0 auto;
}

/* Member selector */
.member-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
  gap: 6px;
  margin-bottom: 12px;
}
.member-chip {
  padding: 8px 6px;
  background: var(--bg2);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-size: 12px;
  text-align: center;
  cursor: pointer;
  transition: all 0.15s;
  color: var(--text2);
  line-height: 1.3;
}
.member-chip:hover { border-color: var(--text2); color: var(--text); }
.member-chip.selected-ikko { background: rgba(255,107,157,0.15); border-color: var(--accent-ikko); color: var(--accent-ikko); }
.member-chip.selected-noimii { background: rgba(107,181,255,0.15); border-color: var(--accent-noimii); color: var(--accent-noimii); }
.member-chip.selected-niajoi { background: rgba(160,107,255,0.15); border-color: var(--accent-niajoi); color: var(--accent-niajoi); }

/* Items list */
.section-header {
  font-size: 12px;
  font-weight: 700;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 8px 0 4px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 6px;
  margin-top: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-header:first-child { margin-top: 0; }
.section-count {
  background: var(--tag-bg);
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 11px;
  color: var(--text2);
}

.item-row {
  display: flex;
  align-items: flex-start;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  gap: 10px;
}
.item-row:last-child { border-bottom: none; }
.item-info { flex: 1; }
.item-product {
  font-size: 13px;
  color: var(--text);
  line-height: 1.4;
}
.item-meta {
  font-size: 11px;
  color: var(--text2);
  margin-top: 2px;
}
.item-price {
  text-align: right;
  white-space: nowrap;
  flex-shrink: 0;
}
.price-tag {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
}
.price-tag.opened {
  color: var(--opened);
}
.price-multi {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 2px;
}
.price-dot-sep {
  font-size: 11px;
  color: var(--text2);
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: flex-end;
}
.price-dot-item { 
  background: var(--tag-bg);
  padding: 2px 5px;
  border-radius: 4px;
  font-size: 12px;
  color: var(--text);
}

/* Category view */
.cat-section { margin-bottom: 16px; }
.cat-header {
  font-size: 13px;
  font-weight: 700;
  padding: 8px 10px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px 8px 0 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
}
.cat-content {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 8px 8px;
  overflow: hidden;
}
.cat-row {
  display: flex;
  align-items: flex-start;
  padding: 8px 10px;
  border-bottom: 1px solid var(--border);
  gap: 10px;
}
.cat-row:last-child { border-bottom: none; }
.cat-member {
  font-size: 12px;
  color: var(--text2);
  min-width: 60px;
  flex-shrink: 0;
}
.cat-product { flex: 1; font-size: 13px; }
.cat-price { text-align: right; flex-shrink: 0; }

/* empty state */
.empty-state {
  text-align: center;
  color: var(--text2);
  padding: 40px 20px;
  font-size: 14px;
}

/* result count */
.result-info {
  font-size: 12px;
  color: var(--text2);
  margin-bottom: 8px;
  padding: 6px 0;
}

/* Spinner */
.loading { text-align:center; padding:40px; color:var(--text2); }
</style>
</head>
<body>
<header>
  <div class="header-title">TRIO DX 値段表 <span id="totalCount"></span></div>
  <div class="group-tabs">
    <button class="group-tab" data-group="ikko" onclick="selectGroup('ikko')">イコラブ</button>
    <button class="group-tab" data-group="noimii" onclick="selectGroup('noimii')">ノイミー</button>
    <button class="group-tab" data-group="niajoi" onclick="selectGroup('niajoi')">ニアジョイ</button>
  </div>
  <div class="search-row">
    <div class="search-wrap">
      <input type="search" id="searchInput" placeholder="メンバー名・商品名で検索" oninput="onSearch()" />
    </div>
    <button id="clearBtn" onclick="clearSearch()">クリア</button>
  </div>
  <div class="view-toggle">
    <button class="view-btn active" id="btnMember" onclick="setView('member')">メンバー別</button>
    <button class="view-btn" id="btnCategory" onclick="setView('category')">カテゴリ別</button>
  </div>
</header>
<main id="main">
  <div class="loading">読み込み中...</div>
</main>

// 価格パース: 開封情報を含む複合価格文字列を分解
function parsePrices(raw) {
  if (!raw) return { prices: [], hasOpened: false };
  const s = raw.trim();
  
  // パターン1: "2200開封1650" → {通常: 2200, 開封: 1650}
  // パターン2: "開封1650" → {開封: 1650}
  // パターン3: "1650.1100.880" → 複数価格
  // パターン4: "used 1100" → 開封扱い
  // パターン5: "1100 開封880" → 通常1100, 開封880

  let result = [];
  let hasOpened = false;

  // "used"を"開封"に統一
  let normalized = s.replace(/usde/gi, '開封').replace(/used\s*/gi, '開封');
  
  // セミコロン・改行を.に統一
  normalized = normalized.replace(/[;\n\r]/g, '.');

  // スペースで分割した各部分を処理
  const parts = normalized.split(/[\s]+/).filter(p => p.trim());
  
  for (const part of parts) {
    // "数字開封数字" パターン
    const m1 = part.match(/^(\d+)開封(\d+)$/);
    if (m1) {
      result.push({ val: parseInt(m1[1]), opened: false });
      result.push({ val: parseInt(m1[2]), opened: true });
      hasOpened = true;
      continue;
    }
    // "開封数字" パターン
    const m2 = part.match(/^開封(\d+)$/);
    if (m2) {
      result.push({ val: parseInt(m2[1]), opened: true });
      hasOpened = true;
      continue;
    }
    // "数字.数字.数字" パターン (ドット区切り複数価格)
    if (part.includes('.')) {
      const dotParts = part.split('.').filter(p => /^\d+$/.test(p.trim()));
      dotParts.forEach(dp => result.push({ val: parseInt(dp), opened: false }));
      continue;
    }
    // 純粋な数字
    if (/^\d+$/.test(part)) {
      result.push({ val: parseInt(part), opened: false });
      continue;
    }
    // "数字開封" で終わるパターン (末尾が開封)
    const m3 = part.match(/^(\d+)開封$/);
    if (m3) {
      result.push({ val: parseInt(m3[1]), opened: false });
      hasOpened = true; // 開封価格が続く可能性
      continue;
    }
    // コンマ区切り
    const commaParts = part.split(',').filter(p => /^\d+$/.test(p.replace('.','').trim()));
    if (commaParts.length > 0) {
      commaParts.forEach(cp => {
        const n = parseInt(cp.replace('.',''));
        if (!isNaN(n)) result.push({ val: n, opened: false });
      });
    }
  }
  
  return { prices: result, hasOpened };
}

function formatPrice(priceObj) {
  if (!priceObj.prices || priceObj.prices.length === 0) return '';
  if (priceObj.prices.length === 1) {
    const p = priceObj.prices[0];
    return `<span class="price-tag${p.opened ? ' opened' : ''}">¥${p.val.toLocaleString()}</span>`;
  }
  // 複数価格
  const tags = priceObj.prices.map(p => 
    `<span class="price-dot-item${p.opened ? ' opened' : ''}" style="${p.opened ? 'color:var(--opened);' : ''}">${p.opened ? '開封 ' : ''}¥${p.val.toLocaleString()}</span>`
  ).join('');
  return `<div class="price-dot-sep">${tags}</div>`;
}

function filterData(group, member, query) {
  let d = RAW_DATA.filter(x => x.group === group);
  if (member) d = d.filter(x => x.member === member);
  if (query) {
    const q = query.toLowerCase();
    d = d.filter(x => x.member.toLowerCase().includes(q) || x.product.toLowerCase().includes(q));
  }
  return d;
}

  html += '<div class="member-grid">';
  for (const m of members) {
    const count = filtered.filter(x => x.member === m).length;
    if (count === 0 && searchQuery) continue;
    const selClass = (m === activeMember) ? ` selected-${currentGroup}` : '';
    html += `<div class="member-chip${selClass}" onclick="selectMember('${m.replace(/'/g,"\\'")}')">
      ${m}<br><span style="font-size:10px;opacity:0.7">${count}件</span>
    </div>`;
  }
  html += '</div>';
  
  // アイテムリスト
  if (activeMember) {
    const items = filtered.filter(x => x.member === activeMember);
    // カテゴリでグループ化
    const byCat = {};
    for (const item of items) {
      if (!byCat[item.category]) byCat[item.category] = [];
      byCat[item.category].push(item);
    }
    
    html += `<div class="result-info">${activeMember} の商品 ${items.length}件</div>`;
    
    for (const cat of CATEGORY_ORDER) {
      if (!byCat[cat] || byCat[cat].length === 0) continue;
      const catItems = byCat[cat];
      html += `<div class="section-header">${cat} <span class="section-count">${catItems.length}</span></div>`;
      for (const item of catItems) {
        const priceObj = parsePrices(item.price_raw);
        html += `<div class="item-row">
          <div class="item-info">
            <div class="item-product">${escHtml(item.product)}</div>
          </div>
          <div class="item-price">${formatPrice(priceObj)}</div>
        </div>`;
      }
    }
  } else if (searchQuery) {
    // 検索結果: メンバー未選択
    html += `<div class="result-info">「${escHtml(searchQuery)}」の検索結果 ${filtered.length}件</div>`;
    // メンバー別に表示
    const byMember = {};
    for (const item of filtered) {
      if (!byMember[item.member]) byMember[item.member] = [];
      byMember[item.member].push(item);
    }
    for (const m of members) {
      if (!byMember[m]) continue;
      html += `<div class="section-header">${m} <span class="section-count">${byMember[m].length}</span></div>`;
      for (const item of byMember[m]) {
        const priceObj = parsePrices(item.price_raw);
        html += `<div class="item-row">
          <div class="item-info">
            <div class="item-product">${escHtml(item.product)}</div>
            <div class="item-meta">${escHtml(item.category)}</div>
          </div>
          <div class="item-price">${formatPrice(priceObj)}</div>
        </div>`;
      }
    }
    if (filtered.length === 0) {
      html += '<div class="empty-state">該当する商品が見つかりませんでした</div>';
    }
  } else {
    html += '<div class="empty-state" style="padding:20px 0;font-size:13px;color:var(--text2);">メンバーを選択してください</div>';
  }
  
  main.innerHTML = html;
}

function renderCategoryView(main) {
  const filtered = filterData(currentGroup, null, searchQuery);
  const members = GROUP_MEMBERS[currentGroup];
  
  // カテゴリでグループ化
  const byCat = {};
  for (const item of filtered) {
    if (!byCat[item.category]) byCat[item.category] = [];
    byCat[item.category].push(item);
  }
  
  let html = '';
  if (searchQuery) {
    html += `<div class="result-info">「${escHtml(searchQuery)}」の検索結果 ${filtered.length}件</div>`;
  }
  
  let hasAny = false;
  for (const cat of CATEGORY_ORDER) {
    if (!byCat[cat] || byCat[cat].length === 0) continue;
    hasAny = true;
    const catItems = byCat[cat];
    
    // 商品名でまとめる
    const byProduct = {};
    for (const item of catItems) {
      if (!byProduct[item.product]) byProduct[item.product] = [];
      byProduct[item.product].push(item);
    }
    
    html += `<div class="cat-section">
      <div class="cat-header">
        <span>${cat}</span>
        <span class="section-count">${catItems.length}件</span>
      </div>
      <div class="cat-content">`;
    
    for (const prod of Object.keys(byProduct)) {
      const prodItems = byProduct[prod];
      html += `<div class="cat-row">
        <div style="flex:1">
          <div class="cat-product">${escHtml(prod)}</div>
          <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;">`;
      
      for (const item of prodItems) {
        const priceObj = parsePrices(item.price_raw);
        const mainPrice = priceObj.prices[0];
        if (!mainPrice) continue;
        html += `<span style="font-size:11px;background:var(--tag-bg);padding:2px 6px;border-radius:4px;white-space:nowrap;">
          <span style="color:var(--text2)">${item.member} </span>
          <span style="color:${mainPrice.opened ? 'var(--opened)' : 'var(--text)'}">¥${mainPrice.val.toLocaleString()}</span>
        </span>`;
      }
      
      html += `</div></div></div>`;
    }
    
    html += `</div></div>`;
  }
  
  if (!hasAny) {
    html += '<div class="empty-state">該当する商品が見つかりませんでした</div>';
  }
  
  main.innerHTML = html;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

  noimii: RAW_DATA.filter(x=>x.group==='noimii').length,
  niajoi: RAW_DATA.filter(x=>x.group==='niajoi').length
};

selectGroup('ikko');
</script>
