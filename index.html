<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>値段表 | 秋葉原TRIO DX</title>
<style>
:root {
  --bg: #0f0f13;
  --bg2: #1a1a22;
  --bg3: #22222e;
  --border: #333344;
  --text: #e8e8f0;
  --text2: #aaaacc;
  --accent: #7c6fe0;
  --accent2: #5a50b0;
  --orange: #ff8c42;
  --tag-bg: #2a2a3a;
  --tab-active: #7c6fe0;
  --search-bg: #1e1e2a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, 'Hiragino Sans', 'Yu Gothic', sans-serif; font-size: 14px; min-height: 100vh; }
header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 10px 12px; position: sticky; top: 0; z-index: 100; }
.header-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.header-top h1 { font-size: 16px; font-weight: 700; color: var(--text); flex: 1; }
.count-badge { background: var(--tag-bg); border: 1px solid var(--border); border-radius: 12px; padding: 2px 8px; font-size: 11px; color: var(--text2); }

/* Group Tabs */
.group-tabs { display: flex; gap: 4px; margin-bottom: 8px; }
.group-tab { flex: 1; padding: 6px 4px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg3); color: var(--text2); font-size: 12px; font-weight: 600; cursor: pointer; text-align: center; transition: all 0.15s; }
.group-tab.active { background: var(--tab-active); border-color: var(--tab-active); color: #fff; }
.group-tab:hover:not(.active) { background: var(--bg2); color: var(--text); }

/* View Mode */
.view-toggle { display: flex; gap: 4px; margin-bottom: 8px; }
.view-btn { flex: 1; padding: 5px; border: 1px solid var(--border); border-radius: 5px; background: var(--bg3); color: var(--text2); font-size: 11px; cursor: pointer; text-align: center; transition: all 0.15s; }
.view-btn.active { background: var(--accent2); border-color: var(--accent); color: #fff; }

/* Search */
.search-wrap { position: relative; }
.search-input { width: 100%; background: var(--search-bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 7px 32px 7px 10px; font-size: 13px; outline: none; }
.search-input:focus { border-color: var(--accent); }
.search-clear { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text2); cursor: pointer; font-size: 14px; line-height: 1; display: none; }
.search-clear.visible { display: block; }

/* Main content */
main { padding: 8px; }

/* Member view */
.member-section { margin-bottom: 12px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.member-header { background: var(--bg2); padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
.member-name { font-size: 15px; font-weight: 700; }
.member-count { font-size: 11px; color: var(--text2); }
.member-body { padding: 6px 8px; display: none; }
.member-body.open { display: block; }

/* Category view */
.category-section { margin-bottom: 12px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.category-header { background: var(--bg2); padding: 8px 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
.category-name { font-size: 13px; font-weight: 700; color: var(--accent); }
.category-count { font-size: 11px; color: var(--text2); }
.category-body { padding: 6px 8px; display: none; }
.category-body.open { display: block; }

/* Item rows */
.item-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 5px 4px; border-bottom: 1px solid var(--border); gap: 8px; }
.item-row:last-child { border-bottom: none; }
.item-name { flex: 1; font-size: 12px; color: var(--text); line-height: 1.4; word-break: break-all; }
.item-member { flex: 0 0 auto; font-size: 11px; color: var(--text2); min-width: 60px; text-align: right; }
.item-prices { flex: 0 0 auto; text-align: right; min-width: 80px; }
.price-tag { display: inline-block; font-size: 13px; font-weight: 700; }
.price-tag.normal { color: var(--text); }
.price-tag.orange { color: var(--orange); }
.price-sep { color: var(--text2); font-size: 11px; margin: 0 2px; }
.kaifuku-label { display: inline-block; font-size: 10px; color: var(--orange); border: 1px solid var(--orange); border-radius: 3px; padding: 0 3px; margin-left: 2px; vertical-align: middle; }

/* Category tags on items */
.cat-tag { display: inline-block; font-size: 10px; color: var(--text2); background: var(--tag-bg); border-radius: 3px; padding: 1px 4px; margin-right: 4px; flex-shrink: 0; }

/* Empty state */
.empty { text-align: center; color: var(--text2); padding: 32px; font-size: 13px; }

/* Highlight for search */
mark { background: rgba(124,111,224,0.35); color: inherit; border-radius: 2px; }
</style>
</head>

let currentGroup = 'イコラブ';
let currentView = 'member';
let searchQuery = '';

function switchGroup(group, btn) {
  currentGroup = group;
  document.querySelectorAll('.group-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function switchView(view) {
  currentView = view;
  document.getElementById('btnMember').classList.toggle('active', view === 'member');
  document.getElementById('btnCategory').classList.toggle('active', view === 'category');
  render();
}

function onSearch() {
  searchQuery = document.getElementById('searchInput').value;
  document.getElementById('searchClear').classList.toggle('visible', searchQuery.length > 0);
  render();
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  searchQuery = '';
  document.getElementById('searchClear').classList.remove('visible');
  render();
}

function highlight(text, query) {
  if (!query) return escHtml(text);
  const escaped = escHtml(text);
  if (!query) return escaped;
  const re = new RegExp('(' + escRe(escHtml(query)) + ')', 'gi');
  return escaped.replace(re, '<mark>$1</mark>');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function escRe(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function renderPrices(entry) {
  const prices = entry.prices;
  const hasK = entry.hasKaifuku;
  if (!prices || !prices.length) return '';
  
  let html = '';
  prices.forEach((p, idx) => {
    const isLast = idx === prices.length - 1;
    const isOrange = prices.length > 1 && isLast;
    const cls = isOrange ? 'orange' : 'normal';
    if (idx > 0) html += '<span class="price-sep">/</span>';
    html += `<span class="price-tag ${cls}">¥${p.toLocaleString()}</span>`;
  });
  if (hasK) html += '<span class="kaifuku-label">開封済</span>';
  return html;
}

  let items = DATA.filter(e => e.group === currentGroup);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    items = items.filter(e =>
      e.member.toLowerCase().includes(q) ||
      e.product.toLowerCase().includes(q)
    );
  }
  return items;
}

function render() {
  const main = document.getElementById('main');
  const items = getFilteredData();
  
  document.getElementById('countBadge').textContent = items.length.toLocaleString() + '件';
  
  if (!items.length) {
    main.innerHTML = '<div class="empty">該当する商品が見つかりません</div>';
    return;
  }
  
  if (currentView === 'member') {
    renderMemberView(main, items);
  } else {
    renderCategoryView(main, items);
  }
}

function renderMemberView(main, items) {
  const order = MEMBER_ORDER[currentGroup] || [];
  const byMember = {};
  items.forEach(e => {
    if (!byMember[e.member]) byMember[e.member] = [];
    byMember[e.member].push(e);
  });
  
  const members = order.filter(m => byMember[m]);
  // Add any not in order
  Object.keys(byMember).forEach(m => { if (!members.includes(m)) members.push(m); });
  
  let html = '';
  members.forEach(member => {
    const entries = byMember[member];
    if (!entries) return;
    const mHl = highlight(member, searchQuery);
    html += `<div class="member-section">
      <div class="member-header" onclick="toggleSection(this)">
        <span class="member-name">${mHl}</span>
        <span class="member-count">${entries.length}件 ▼</span>
      </div>
      <div class="member-body open">`;
    
    // Group by category
    const byCat = {};
    entries.forEach(e => {
      if (!byCat[e.category]) byCat[e.category] = [];
      byCat[e.category].push(e);
    });
    const cats = CATEGORY_ORDER.filter(c => byCat[c]).concat(
      Object.keys(byCat).filter(c => !CATEGORY_ORDER.includes(c))
    );
    
    cats.forEach(cat => {
      html += `<div style="margin-bottom:6px"><div style="font-size:10px;color:var(--accent);padding:2px 4px;margin-bottom:2px;font-weight:700">${escHtml(cat)}</div>`;
      byCat[cat].forEach(e => {
        html += `<div class="item-row">
          <span class="item-name">${highlight(e.product, searchQuery)}</span>
          <span class="item-prices">${renderPrices(e)}</span>
        </div>`;
      });
      html += '</div>';
    });
    
    html += '</div></div>';
  });
  
  main.innerHTML = html;
}

function renderCategoryView(main, items) {
  const byCat = {};
  items.forEach(e => {
    if (!byCat[e.category]) byCat[e.category] = [];
    byCat[e.category].push(e);
  });
  
  const cats = CATEGORY_ORDER.filter(c => byCat[c]).concat(
    Object.keys(byCat).filter(c => !CATEGORY_ORDER.includes(c))
  );
  
  const order = MEMBER_ORDER[currentGroup] || [];
  
  let html = '';
  cats.forEach(cat => {
    const entries = byCat[cat];
    html += `<div class="category-section">
      <div class="category-header" onclick="toggleSection(this)">
        <span class="category-name">${escHtml(cat)}</span>
        <span class="category-count">${entries.length}件 ▼</span>
      </div>
      <div class="category-body open">`;
    
    // Sort by member order
    const sorted = [...entries].sort((a,b) => {
      const ai = order.indexOf(a.member);
      const bi = order.indexOf(b.member);
      if (ai !== bi) return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
      return a.product.localeCompare(b.product, 'ja');
    });
    
    sorted.forEach(e => {
      html += `<div class="item-row">
        <span class="item-name">${highlight(e.product, searchQuery)}</span>
        <span class="item-member">${highlight(e.member, searchQuery)}</span>
        <span class="item-prices">${renderPrices(e)}</span>
      </div>`;
    });
    
    html += '</div></div>';
  });
  
  main.innerHTML = html;
}

function toggleSection(header) {
  const body = header.nextElementSibling;
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  // Update arrow
  const countEl = header.querySelector('.member-count, .category-count');
  if (countEl) {
    countEl.textContent = countEl.textContent.replace(isOpen ? '▼' : '▲', isOpen ? '▲' : '▼');
  }
}

// Initial render
render();
</script>
</body>
</html>
