<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>💰 値段表</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');
:root{
  --bg:#0f0f13;--s1:#1a1a22;--s2:#22222e;--bd:#2e2e3e;
  --tx:#f0f0f8;--dim:#8888aa;
  --iko:#ff6b9d;--noi:#5bc8f5;--nia:#7ed957;
  --price:#ffd166;--used:#ff9f43;--tag:#33334a;
  --r:12px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;min-height:100vh}

/* ヘッダー */
header{position:sticky;top:0;z-index:100;background:rgba(15,15,19,.96);backdrop-filter:blur(16px);border-bottom:1px solid var(--bd);padding:10px 14px 8px}
.h-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.title{font-size:17px;font-weight:900;letter-spacing:.04em}
.cnt{margin-left:auto;font-size:11px;color:var(--dim);white-space:nowrap}

/* 検索 */
.sw{position:relative;margin-bottom:8px}
.sw input{width:100%;background:var(--s2);border:1.5px solid var(--bd);border-radius:10px;padding:9px 12px 9px 34px;color:var(--tx);font-family:inherit;font-size:14px;outline:none;transition:border-color .2s}
.sw input:focus{border-color:var(--iko)}
.sw input::placeholder{color:var(--dim)}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:15px;pointer-events:none}

/* タブ */
.tabs{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:5px 13px;border-radius:20px;border:1.5px solid var(--bd);background:transparent;color:var(--dim);font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap}
.tab.a-all{background:var(--s2);border-color:#666;color:var(--tx)}
.tab.a-iko{background:var(--iko);border-color:var(--iko);color:#fff}
.tab.a-noi{background:var(--noi);border-color:var(--noi);color:#111}
.tab.a-nia{background:var(--nia);border-color:var(--nia);color:#111}

/* メインコンテンツ */
main{padding:10px 14px 60px}

/* 切り替えボタン */
.view-toggle{display:flex;gap:6px;margin-bottom:12px}
.vbtn{flex:1;padding:7px;border-radius:8px;border:1px solid var(--bd);background:var(--s2);color:var(--dim);font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;text-align:center;transition:all .2s}
.vbtn.active{background:var(--s1);border-color:#666;color:var(--tx)}

/* メンバー別ビュー */
.member-card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.member-header{display:flex;align-items:center;gap:8px;padding:12px 14px;cursor:pointer;user-select:none}
.mdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.mdot-iko{background:var(--iko)}
.mdot-noi{background:var(--noi)}
.mdot-nia{background:var(--nia)}
.mname{font-size:16px;font-weight:800}
.mcount{margin-left:auto;font-size:11px;color:var(--dim)}
.mchevron{color:var(--dim);font-size:12px;transition:transform .2s;flex-shrink:0}
.member-card.open .mchevron{transform:rotate(180deg)}
.member-body{display:none;padding:0 14px 12px}
.member-card.open .member-body{display:block}

.item-row{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--bd)}
.item-row:last-child{border-bottom:none}
.item-name{font-size:13px;color:var(--dim);flex:1;padding-right:8px;line-height:1.4}
.item-prices{flex-shrink:0;text-align:right}

/* 商品別ビュー */
.cat-section{margin-bottom:18px}
.cat-label{font-size:11px;font-weight:700;color:var(--dim);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.cat-label::before{content:'';display:block;width:3px;height:14px;border-radius:2px;background:var(--iko)}
.cat-iko .cat-label::before{background:var(--iko)}
.cat-noi .cat-label::before{background:var(--noi)}
.cat-nia .cat-label::before{background:var(--nia)}
.cat-other .cat-label::before{background:#666}

.prod-card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:10px 12px;margin-bottom:5px}
.prod-top{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.prod-item{font-size:13px;font-weight:700;flex:1}
.prod-member{font-size:11px;color:var(--dim)}
.price-row{display:flex;flex-wrap:wrap;gap:4px}

/* 価格表示 */
.p{display:inline-block;padding:3px 8px;border-radius:6px;font-weight:800;font-size:13px}
.p-n{background:rgba(255,209,102,.12);border:1px solid rgba(255,209,102,.25);color:var(--price)}
.p-u{background:rgba(255,159,67,.12);border:1px solid rgba(255,159,67,.25);color:var(--used)}
.p-s{background:var(--price);color:#111;font-size:14px;padding:3px 10px}

/* グループバッジ */
.gb{display:inline-block;font-size:10px;font-weight:700;padding:1px 5px;border-radius:4px;letter-spacing:.06em;margin-left:4px;vertical-align:middle}
.gb-iko{background:rgba(255,107,157,.15);color:var(--iko)}
.gb-noi{background:rgba(91,200,245,.15);color:var(--noi)}
.gb-nia{background:rgba(126,217,87,.15);color:var(--nia)}

/* 空状態 */
.empty{text-align:center;padding:60px 20px;color:var(--dim)}
.empty-icon{font-size:40px;margin-bottom:12px}

/* ハイライト */
mark{background:rgba(255,209,102,.2);color:var(--price);border-radius:2px;padding:0 1px}

/* 更新案内 */
.update-hint{background:var(--s2);border:1px dashed var(--bd);border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:11px;color:var(--dim);line-height:1.7}
.update-hint code{font-family:monospace;background:var(--bd);padding:0 4px;border-radius:3px;font-size:10px}
</style>
</head>
<body>
<header>
  <div class="h-top">
    <div class="title">💰 値段表</div>
    <div class="cnt" id="cnt"></div>
  </div>
  <div class="sw">
    <span class="si">🔍</span>
    <input type="search" id="q" placeholder="メンバー名・商品名で検索…" autocomplete="off" autocorrect="off">
  </div>
  <div class="tabs" id="tabs">
    <button class="tab a-all" onclick="setG('all',this)">すべて</button>
    <button class="tab" onclick="setG('iko',this)">🎀 イコラブ</button>
    <button class="tab" onclick="setG('noi',this)">💙 ノイミー</button>
    <button class="tab" onclick="setG('nia',this)">🌿 ニアジョイ</button>
  </div>
</header>

<main>
<div class="update-hint">

</div>
<div id="content"></div>

const CAT_MAP = (name) => {

    if(cat.includes('うちわ') && !cat.includes('キーホルダー')) return 'うちわ';
    if(cat.includes('うちわキーホルダー') || cat.includes('ミニアクスタ')) return 'うちわキーホルダー・ミニアクスタ';
    if(cat.includes('ビッグアクキー')) return 'ビッグアクキー';
    if(cat === 'ミニフォト レア') return 'ミニフォト レア';

    if(cat === 'ラッフル') return 'ラッフル景品';
    if(cat === 'くじ' || cat === 'DMMくじ') return 'くじ景品';

  }
  // 【】なしの商品名から分類
  if(/Blu-ray|DVD/.test(name)) return 'Blu-ray / DVD';
  if(/タオル|はちまき/.test(name)) return 'タオル';
  if(/缶バッジ|バッジ/.test(name)) return '缶バッジ';
  if(/アクスタ/.test(name)) return 'アクスタ';
  if(/うちわキーホルダー|ミニアクスタ/.test(name)) return 'うちわキーホルダー・ミニアクスタ';

// 価格解析
function parsePrices(raw) {
  raw = (raw||'').replace(/"/g,'').trim();
  const hasUsed = /開封|used/i.test(raw);
  const nums = (raw.match(/\d+/g)||[]).map(Number).filter(n=>n>=50);
  if(!nums.length) return null;
  const uniq = [...new Set(nums)];
  if(!hasUsed) return {normal:uniq, used:[]};
  // 開封前後の数値を分ける
  const usedNums = [];
  const normalNums = [];
  const parts = raw.split(/開封|used/i);
  const usedPart = parts.slice(1).join(' ');
  (usedPart.match(/\d+/g)||[]).map(Number).filter(n=>n>=50).forEach(n=>usedNums.push(n));
  uniq.forEach(n => {
    if(!usedNums.includes(n)) normalNums.push(n);
  });
  return {normal:[...new Set(normalNums)], used:[...new Set(usedNums)]};
}

function priceHTML(raw, highlight='') {
  const p = parsePrices(raw);
  if(!p) return '';
  const chips = [];
  if(p.normal.length===1 && p.used.length===0) {
    const s = '¥'+p.normal[0].toLocaleString();
    return `<span class="p p-s">${hl(s,highlight)}</span>`;
  }
  p.normal.forEach(n => chips.push(`<span class="p p-n">${hl('¥'+n.toLocaleString(),highlight)}</span>`));
  p.used.forEach(n => chips.push(`<span class="p p-u">${hl('¥'+n.toLocaleString(),highlight)} 開封</span>`));
  return `<div class="price-row">${chips.join('')}</div>`;
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function hl(s,q){
  if(!q)return esc(s);
  const re=new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');
  return esc(s).replace(re,m=>`<mark>${m}</mark>`);
}

function getFiltered() {
  const q = curQ.toLowerCase();

}

  const filtered = getFiltered();
  document.getElementById('cnt').textContent = filtered.length+'件';
  const q = curQ;
  const el = document.getElementById('content');

  if(!filtered.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div>「${esc(q)}」に一致する商品が見つかりませんでした</div>`;
    return;
  }

  if(curView==='member') renderMember(filtered, q, el);
  else renderItem(filtered, q, el);
}

function renderMember(data, q, el) {
  // メンバーでグループ化
  const byMember = {};
  data.forEach(([member,group,item,price]) => {
    if(!byMember[member]) byMember[member]={group,items:[]};
    byMember[member].items.push([item,price]);
  });

  let html='';
  for(const [member,{group,items}] of Object.entries(byMember)) {
    const gb = curGroup==='all' ? `<span class="gb ${GRP_GB[group]}">${GRP_NAME[group]||''}</span>` : '';
    html+=`<div class="member-card" id="mc-${CSS.escape(member)}">
<div class="member-header" onclick="toggle('mc-${CSS.escape(member)}')">
  <div class="mdot ${GRP_DOT[group]}"></div>
  <div class="mname">${hl(member,q)}${gb}</div>
  <div class="mcount">${items.length}件</div>
  <div class="mchevron">▼</div>
</div>
<div class="member-body">`;
    items.forEach(([item,price]) => {
      html+=`<div class="item-row"><div class="item-name">${hl(item,q)}</div><div class="item-prices">${priceHTML(price,q)}</div></div>`;
    });
    html+='</div></div>';
  }
  el.innerHTML = html;

  // 検索中は全展開
  if(q) {
    document.querySelectorAll('.member-card').forEach(c=>c.classList.add('open'));
  }
}

function renderItem(data, q, el) {
  // カテゴリ→商品→メンバーでグループ化
  const byCat = {};
  data.forEach(([member,group,item,price]) => {
    const cat = CAT_MAP(item);
    if(!byCat[cat]) byCat[cat]=[];
    byCat[cat].push({member,group,item,price});
  });

  const cats = Object.keys(byCat).sort((a,b) => {
    const ai = CAT_ORDER.indexOf(a), bi = CAT_ORDER.indexOf(b);
    return (ai<0?99:ai)-(bi<0?99:bi);
  });

  let html='';
  for(const cat of cats) {
    const rows = byCat[cat];
    // 商品名でさらにグループ化
    const byItem = {};
    rows.forEach(r => {
      if(!byItem[r.item]) byItem[r.item]=[];
      byItem[r.item].push(r);
    });

    html+=`<div class="cat-section"><div class="cat-label">${esc(cat)}</div>`;
    for(const [item, members] of Object.entries(byItem)) {
      html+=`<div class="prod-card"><div class="prod-top"><div class="prod-item">${hl(item,q)}</div></div>`;
      members.forEach(({member,group,price}) => {
        const gb = curGroup==='all' ? `<span class="gb ${GRP_GB[group]}">${GRP_NAME[group]}</span>` : '';
        html+=`<div style="display:flex;justify-content:space-between;align-items:flex-start;padding:3px 0;border-bottom:1px solid var(--bd)">
<div style="font-size:13px;padding-right:8px">${hl(member,q)}${gb}</div>
<div>${priceHTML(price,q)}</div>
</div>`;
      });
      html+='</div>';
    }
    html+='</div>';
  }
  el.innerHTML = html;
}

function toggle(id) {
  const el = document.getElementById(id);
  if(el) el.classList.toggle('open');
}

function setG(g, btn) {
  curGroup = g;
  document.querySelectorAll('.tab').forEach(t => {
    t.className = 'tab';
    if(t===btn) t.classList.add('a-'+g);
  });
  render();
}

function setView(v) {
  curView = v;
  ['member','item'].forEach(x => {
    document.getElementById('v-'+x).classList.toggle('active', x===v);
  });
  render();
}

document.getElementById('q').addEventListener('input', function(){
  curQ = this.value.trim();
  render();
});

render();
</script>
</body>
</html>
