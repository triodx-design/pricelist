<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>値段表 - 秋葉原TRIO DX</title>
<style>
:root {
  --bg: #1a1a1a;
  --surface: #252525;
  --surface2: #2e2e2e;
  --border: #3a3a3a;
  --text: #e0e0e0;
  --text-sub: #999;
  --accent: #ff6b00;
  --accent2: #ff8c00;
  --tab-active: #ff6b00;
  --tag-bg: #333;
  --tag-text: #ccc;
  --kaifuku: #ff6b00;
  --search-bg: #2a2a2a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Meiryo', sans-serif;
  font-size: 14px;
  min-height: 100vh;
}
/* ヘッダー */
.header {
  background: #111;
  padding: 10px 16px 0;
  position: sticky;
  top: 0;
  z-index: 100;
  border-bottom: 1px solid var(--border);
}
.header-title {
  font-size: 13px;
  color: var(--text-sub);
  margin-bottom: 8px;
  letter-spacing: 0.05em;
}
/* グループタブ */
.group-tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 0;
}
.group-tab {
  padding: 8px 16px;
  border: none;
  background: transparent;
  color: var(--text-sub);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: all 0.2s;
  white-space: nowrap;
}
.group-tab.active {
  color: var(--tab-active);
  border-bottom-color: var(--tab-active);
}
/* コントロールバー */
.controls {
  background: var(--surface);
  padding: 10px 16px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 56px;
  z-index: 99;
}
.search-box {
  flex: 1;
  min-width: 160px;
  background: var(--search-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 7px 12px;
  color: var(--text);
  font-size: 14px;
  outline: none;
}
.search-box:focus {
  border-color: var(--accent);
}
.search-box::placeholder { color: var(--text-sub); }
.view-toggle {
  display: flex;
  background: var(--search-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.view-btn {
  padding: 7px 14px;
  border: none;
  background: transparent;
  color: var(--text-sub);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.view-btn.active {
  background: var(--accent);
  color: #fff;
}
/* カウント表示 */
.count-bar {
  padding: 6px 16px;
  font-size: 12px;
  color: var(--text-sub);
  background: var(--bg);
  border-bottom: 1px solid var(--border);
}
/* メインコンテンツ */
.main { padding: 12px 16px; }

/* ===== メンバー別ビュー ===== */
.member-section {
  margin-bottom: 16px;
  background: var(--surface);
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.member-header {
  padding: 10px 14px;
  background: var(--surface2);
  font-weight: 700;
  font-size: 15px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.member-count {
  font-size: 11px;
  color: var(--text-sub);
  font-weight: 400;
}
.product-list {
  padding: 6px 0;
}
.product-row {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  padding: 6px 14px;
  gap: 8px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.product-row:last-child { border-bottom: none; }
.product-name {
  flex: 1;
  font-size: 13px;
  color: #ccc;
  min-width: 0;
  word-break: break-all;
}
.product-prices {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: flex-end;
  flex-shrink: 0;
}
.price-tag {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
}
.price-tag.kaifuku {
  color: var(--kaifuku);
}
.price-sep {
  color: var(--border);
  font-size: 11px;
}

/* ===== カテゴリ別ビュー ===== */
.category-section {
  margin-bottom: 16px;
  background: var(--surface);
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.category-header {
  padding: 10px 14px;
  background: var(--surface2);
  font-weight: 700;
  font-size: 14px;
  color: var(--accent2);
  display: flex;
  align-items: center;
  gap: 8px;
}
.category-count {
  font-size: 11px;
  color: var(--text-sub);
  font-weight: 400;
}
/* カテゴリ内の商品グループ */
.product-group {
  border-bottom: 1px solid var(--border);
}
.product-group:last-child { border-bottom: none; }
.product-group-header {
  padding: 7px 14px 4px;
  font-size: 12px;
  color: var(--text-sub);
  font-style: italic;
}
.cat-member-row {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  padding: 5px 14px;
  gap: 8px;
}
.cat-member-name {
  font-size: 13px;
  color: #ccc;
  flex-shrink: 0;
  min-width: 80px;
}
.cat-member-prices {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: flex-end;
}

/* ハイライト */
.highlight {
  background: rgba(255,107,0,0.15);
  border-radius: 3px;
  padding: 0 2px;
}

/* 空状態 */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-sub);
  font-size: 14px;
}

/* 更新日 */
.updated-date {
  text-align: right;
  padding: 4px 16px 8px;
  font-size: 11px;
  color: var(--text-sub);
}
</style>
</head>
<body>

<div class="header">
  <div class="header-title">秋葉原TRIO DX 値段表</div>
  <div class="group-tabs">
    <button class="group-tab active" onclick="selectGroup('イコラブ')">イコラブ</button>
    <button class="group-tab" onclick="selectGroup('ノイミー')">ノイミー</button>
    <button class="group-tab" onclick="selectGroup('ニアジョイ')">ニアジョイ</button>
  </div>
</div>

<div class="controls">
  <input class="search-box" type="search" id="searchBox" placeholder="メンバー名・商品名で検索..." oninput="onSearch()">
  <div class="view-toggle">
    <button class="view-btn active" id="btnMember" onclick="setView('member')">メンバー別</button>
    <button class="view-btn" id="btnCategory" onclick="setView('category')">カテゴリ別</button>
  </div>
</div>

<div class="count-bar" id="countBar"></div>
<div class="updated-date" id="updatedDate"></div>

<div class="main" id="mainContent"></div>

function selectGroup(group) {
  currentGroup = group;
  document.querySelectorAll('.group-tab').forEach(t => {
    t.classList.toggle('active', t.textContent === group);
  });
  render();
}

function setView(v) {
  currentView = v;
  document.getElementById('btnMember').classList.toggle('active', v === 'member');
  document.getElementById('btnCategory').classList.toggle('active', v === 'category');
  render();
}

function onSearch() {
  searchQuery = document.getElementById('searchBox').value.trim().toLowerCase();
  render();
}

function hl(text, q) {
  if (!q) return escHtml(text);
  const lower = text.toLowerCase();
  const idx = lower.indexOf(q);
  if (idx < 0) return escHtml(text);
  return escHtml(text.slice(0, idx)) + '<span class="highlight">' + escHtml(text.slice(idx, idx + q.length)) + '</span>' + escHtml(text.slice(idx + q.length));
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderPrices(prices, hasKaifuku) {
  // prices配列の最後の要素が「開封価格」（hasKaifukuがtrueのとき）
  // 複数価格の場合: 先頭が通常価格、後続 or hasKaifuku
  if (prices.length === 1) {
    const cls = hasKaifuku ? 'price-tag kaifuku' : 'price-tag';
    return '<span class="' + cls + '">¥' + prices[0].toLocaleString() + '</span>';
  }
  // 複数価格
  let html = '';
  prices.forEach((p, i) => {
    if (i > 0) html += '<span class="price-sep">/</span>';
    // hasKaifukuの場合、最後の価格または2番目以降をオレンジに
    // 判定: 価格が小さい方が開封（一般的に）→ hasKaifukuがtrueなら最小値をオレンジ
    const isLast = i === prices.length - 1;
    const cls = (hasKaifuku && isLast) ? 'price-tag kaifuku' : 'price-tag';
    html += '<span class="' + cls + '">¥' + p.toLocaleString() + '</span>';
  });
  return html;
}

function getFilteredData() {
  return RAW_DATA.filter(d => {
    if (d.group !== currentGroup) return false;
    if (!searchQuery) return true;
    return d.member.toLowerCase().includes(searchQuery) ||
           d.product.toLowerCase().includes(searchQuery);
  });
}

function render() {
  const data = getFilteredData();
  document.getElementById('countBar').textContent = data.length + '件';
  
  if (data.length === 0) {
    document.getElementById('mainContent').innerHTML = '<div class="empty-state">該当するデータがありません</div>';
    return;
  }
  
  if (currentView === 'member') {
    renderMemberView(data);
  } else {
    renderCategoryView(data);
  }
}

    ? ['大谷映美里','大場花菜','音嶋莉沙','齋藤樹愛羅','齊藤なぎさ','佐々木舞香','高松瞳','瀧脇笙古','野口衣織','諸橋沙夏','山本杏奈']
    : currentGroup === 'ノイミー'
    ? ['尾木波菜','落合希来里','蟹沢萌子','河口夏音','川中子奈月心','櫻井もも','菅波美玲','鈴木瞳美','谷崎早耶','冨田菜々風','永田詩央里','本田珠由記']
    : ['天野 香乃愛','市原 愛弓','江角 怜音','大信田 美月','大西葵','小澤愛実','村山結香','山田 杏佳','山野 愛月','髙橋 舞','逢田 珠里依','藤沢 莉子'];
  
  let html = '';
  allMembers.forEach(member => {
    if (!byMember[member]) return;
    const items = byMember[member];
    html += '<div class="member-section">';
    html += '<div class="member-header">' + hl(member, searchQuery) + '<span class="member-count">' + items.length + '件</span></div>';
    html += '<div class="product-list">';
    items.forEach(d => {
      html += '<div class="product-row">';
      html += '<span class="product-name">' + hl(d.product, searchQuery) + '</span>';
      html += '<span class="product-prices">' + renderPrices(d.prices, d.hasKaifuku) + '</span>';
      html += '</div>';
    });
    html += '</div></div>';
  });
  
  document.getElementById('mainContent').innerHTML = html;
}

function renderCategoryView(data) {
  // カテゴリごとにグループ化 → 商品名ごと → メンバーごと
  const byCat = {};
  data.forEach(d => {
    if (!byCat[d.category]) byCat[d.category] = {};
    if (!byCat[d.category][d.product]) byCat[d.category][d.product] = [];
    byCat[d.category][d.product].push(d);
  });
  
  // カテゴリ順に出力
  const cats = [...CATEGORY_ORDER.filter(c => byCat[c]), ...Object.keys(byCat).filter(c => !CATEGORY_ORDER.includes(c))];
  
  let html = '';
  cats.forEach(cat => {
    const products = byCat[cat];
    const totalCount = Object.values(products).reduce((s, arr) => s + arr.length, 0);
    html += '<div class="category-section">';
    html += '<div class="category-header">' + escHtml(cat) + '<span class="category-count">' + totalCount + '件</span></div>';
    
    Object.entries(products).forEach(([product, items]) => {
      html += '<div class="product-group">';
      html += '<div class="product-group-header">' + hl(product, searchQuery) + '</div>';
      items.forEach(d => {
        html += '<div class="cat-member-row">';
        html += '<span class="cat-member-name">' + hl(d.member, searchQuery) + '</span>';
        html += '<span class="cat-member-prices">' + renderPrices(d.prices, d.hasKaifuku) + '</span>';
        html += '</div>';
      });
      html += '</div>';
    });
    html += '</div>';
  });
  
  document.getElementById('mainContent').innerHTML = html;
}

// 初期表示
render();
</script>
